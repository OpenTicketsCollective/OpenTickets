user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    upstream backend {
        server backend:8000;
    }
    
    server {
        listen 80;
        server_name localhost;
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;
        
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        
        root /usr/share/nginx/html;
        index index.html;
        
        # Error page routing
        error_page 403 /Error/403.html;
        error_page 404 /Error/404.html;
        error_page 500 502 503 504 /Error/500.html;
        
        # Backend API proxy
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Error pages - allow direct access for JS redirects
        location ~ ^/Error/(403|404|500)\.html$ {
            try_files $uri =404;
        }
        location = /Error/403 {
            try_files /Error/403.html =404;
        }
        location = /Error/404 {
            try_files /Error/404.html =404;
        }
        location = /Error/500 {
            try_files /Error/500.html =404;
        }

        # Static assets
        location ~ ^/(assets|scripts)/ {
            try_files $uri =404;
        }
        
        # Root
        location = / {
            try_files /index.html =404;
        }
        
        # SPA page routes - serve the actual .html files without showing extension
        location = /admin {
            try_files /admin.html =404;
        }
        
        location = /staff {
            try_files /staff.html =404;
        }
        
        location = /ticket {
            try_files /ticket.html =404;
        }
        
        location = /new {
            try_files /new.html =404;
        }
        
        # Direct .html file requests
        location ~ ^/(index|admin|staff|ticket|new)\.html$ {
            try_files $uri =404;
        }
        
        # Everything else is 404
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
