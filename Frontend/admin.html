<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenTickets — Admin</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<!-- This is the navigation headers for all the pages that are within the OpenTickets systme -->
  <header>
    <h1>OpenTickets — Admin</h1>
    <nav>
      <a href="/new">Submit Ticket</a>
      <a href="/staff">Staff Dashboard</a>
      <a id="adminLink" href="/admin" style="display:none;">Admin Dashboard</a>
      <button id="logoutButton" style="display:none;">Logout</button>
    </nav>
  </header>
  <main>

<!-- This is the main admin dashboard for admins to manage user accounts and sessions -->
<section class="card" id="dashboard">
      <h2>Admin Dashboard</h2>
        <h1>Admin Control Panel</h1>
<section>
<h2>Create User</h2>
  <form id="createUserForm">
  <input name="email" placeholder="Email" required>
  <input name="first_name" placeholder="First Name" required>
  <input name="last_name" placeholder="Last Name" required>
  <input name="password" placeholder="Password" type="password" required>
  <select name="access_level" required>
  <option value="">Select Access Level</option>
  <option value="Admin">Admin</option>
  <option value="L1">L1</option>
  <option value="L2">L2</option>
  <option value="User">User</option>
</select>
<label for="forcePasswordChange">
  Force Password Change
  <input type="checkbox" id="forcePasswordChange" name="force_password_change">
</label>
<button>Create User</button>
</form>
</section>

<!-- This is the section of the admin dashboard that allows admins to view and manage user accounts, including creating new users, deleting existing users, and resetting user passwords. -->
<section>
<h2>User Accounts</h2>
<div style="max-height: 400px; overflow: auto;">
<table>
<thead>
<tr>
<th>ID</th>
<th>Email</th>
<th>Name</th>
<th>Role</th>
<th>Status</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>
</div>
</section>
<hr>
<!-- This is the section for managing active user sessions -->
<section>
<h2>Active Sessions</h2>
<div style="max-height: 400px; overflow: auto;">
<table style="white-space: nowrap;">
<thead>
<tr>
<th>Session ID</th>
<th>User ID</th>
<th>Created</th>
<th>Expires</th>
<th>IP Address</th>
<th>User Agent</th>
</tr>
</thead>
<tbody id="sessionTable"></tbody>
</table>
</div>
  </section>
  </main>
    <script src="assets/app.js"></script>
    <script src="assets/admin_panel.js"></script>
    <script src="assets/session.js"></script>
</body>
</html>
