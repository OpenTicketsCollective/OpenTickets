<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenTickets — Admin</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <!-- Header and navigation for admin views -->
  <header>
    <h1>OpenTickets — Admin</h1>
    <nav>
      <!-- Link back to public submission page -->
      <a href="index.html">Submit Ticket</a>
      <!-- Link to staff dashboard -->
      <a href="staff.html">Staff Dashboard</a>
      <!-- Current admin dashboard page -->
      <a href="admin_page.html">Admin Dashboard</a>
    </nav>
  </header>
  <main>

<section class="card" id="loginCard">

<h2>Admin Login</h2>

<form id="loginForm">

<label>Username</label>
<input type="text" name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<div class="actions">
<button type="submit">Login</button>
</div>

</form>

<div id="loginMsg" class="muted"></div>

</section>

<section class="card" id="dashboard">

      <h2>Admin Dashboard</h2>
        <h1>Admin Control Panel</h1>
<section>
<h2>Create User</h2>
  <form id="createUserForm">
  <input name="email" placeholder="Email" required>
  <input name="first_name" placeholder="First Name" required>
  <input name="last_name" placeholder="Last Name" required>
  <input name="password" placeholder="Password" type="password" required>
  <select name="access_level">
  <option value="Admin">Admin</option>
  <option value="L1">L1</option>
  <option value="L2">L2</option>
</select>

<label>
Force Password Change
<input type="checkbox" name="force_password_change">
</label>

<button>Create User</button>

</form>
</section>


<section>
<h2>User Accounts</h2>
<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Email</th>
<th>Name</th>
<th>Role</th>
<th>Status</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</section>

<hr>

<section>

<h2>Active Sessions</h2>

<table border="1">
<thead>
<tr>
<th>Session ID</th>
<th>User ID</th>
<th>Created</th>
<th>Expires</th>
</tr>
</thead>

<tbody id="sessionTable"></tbody>
</table>
  </section>
  </main>
    <script src="assets/admin_panel.js"></script>

</body>
</html>
