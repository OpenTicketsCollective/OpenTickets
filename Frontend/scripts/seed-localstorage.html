<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Seed OpenTickets demo data</title>
  <style>body{font-family:Segoe UI,Roboto,Arial,sans-serif;padding:20px;background:#f6f8fa}button{padding:8px 12px}</style>
</head>
<body>
  <h2>Seed OpenTickets demo data</h2>
  <p>This page will write demo users and tickets into <code>localStorage</code> under the key <code>opentickets_db_v1</code>.</p>
  <button id="run">Seed demo data</button>
  <div id="out" style="margin-top:12px;color:#333"></div>
  <p style="margin-top:18px"><a href="../index.html">Open the demo UI</a></p>

  <script>
  (function(){
    const DB_KEY = 'opentickets_db_v1'
    function now(){return new Date().toISOString()}
    document.getElementById('run').addEventListener('click', ()=>{
      const db = {
        users: [
          {username:'tech1', password:'password', role:'tech', display:'Tech One'},
          {username:'admin', password:'password', role:'tech', display:'Administrator'}
        ],
        tickets: [
          {id:1,title:'Email not sending',description:'Unable to send external email',priority:'urgent',assignedTo:null,status:'open',createdAt:now(),creatorName:'Alice',comments:[]},
          {id:2,title:'Printer jam',description:'Paper jam on floor 3 printer',priority:'regular',assignedTo:'tech1',status:'open',createdAt:now(),creatorName:'Bob',comments:[]}
        ],
        nextId:3
      }
      localStorage.setItem(DB_KEY, JSON.stringify(db))
      document.getElementById('out').textContent = 'Seeded demo data and saved to localStorage key "' + DB_KEY + '".'
    })
  })()
  </script>
</body>
</html>
