<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenTickets — Staff Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<!-- This is the navigation headers for all the pages that are available to staff members within the OpenTickets system -->
  <header>
    <h1>OpenTickets — Staff</h1>
    <nav id="navbar">
      <a href="/new">Submit Ticket</a>
      <a href="/staff">Staff Dashboard</a>
      <a id="adminLink" href="/admin" style="display:none;">Admin Dashboard</a>
      <button id="logoutButton">Logout</button>
    </nav>
  </header>
  <main>
    <section class="card hidden" id="dashboard">
      <div class="row">
        <div class="col">
          <h3>Tickets Overview</h3>
          <canvas id="ticketChart" width="200" height="100"></canvas>
        </div>
        <div class="col">
          <h3>Shortcuts</h3>
          <button id="oldestUrgent">Oldest Urgent</button>
          <button id="unassigned">Unassigned</button>
        </div>
      </div>
      <h3>Tickets</h3>
      <div class="table-controls">
        <label>
          Sort by:
          <select id="sortBy">
            <option value="createdAt">Date</option>
            <option value="assignedTo">Assigned To</option>
          </select>
        </label>
      </div>
      <div style="max-height: 300%; overflow: auto;">
      <table id="ticketsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Assigned</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
      <div id="dashboardMsg" class="muted"></div>
    </section>
  </main>
  <script src="assets/app.js"></script>
  <script src="assets/session.js"></script>
</body>
</html>
