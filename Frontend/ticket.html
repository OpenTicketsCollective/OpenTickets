<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenTickets — Ticket</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<!-- This is the navigation headers for all the pages that are available to users and techs within the OpenTickets system -->
  <header>
    <h1>Ticket Details</h1>
    <nav>
      <a href="index.html">Submit Ticket</a>
      <a href="staff.html">Staff Dashboard</a>
    </nav>
  </header>

<!-- This is the main content of the ticket details page, where users and techs can view the details of a specific ticket, including its title, description, status, assigned tech, and any comments or updates related to the ticket. -->
  <main>
    <section class="card" id="ticketCard">
      <h2 id="tTitle">Ticket</h2>
      <div id="tMeta" class="muted"></div>
      <p id="tDesc"></p>

      <div class="row">
        <label>
          Assign to:
          <select id="assignTo"></select>
        </label>
<!-- This is the section for managing the ticket's status and assignment, allowing techs to assign the ticket to themselves or other techs, and update the ticket's status as it progresses through the resolution process. -->
        <label>
          Status:
          <select id="status">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
          </select>
        </label>
        <button id="saveTicket">Save</button>
      </div>
<!-- This is the section for displaying and managing comments on a ticket, allowing users and techs to communicate about the ticket's progress and any updates or issues that arise. -->
      <h3>Comments</h3>
      <ul id="comments" class="list"></ul>
      <form id="commentForm">
        <label>
          Your name
          <input name="author">
        </label>
        <label>
          Message
          <textarea name="message" required></textarea>
        </label>
        <div class="actions">
          <button>Add Comment</button>
        </div>
      </form>
    </section>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
<!-- This is the section for submitting a new ticket if the user has an issue-->
  <main>
    <section class="card">
      <h2>Report an Issue</h2>
      <form id="ticketForm">
<!-- This is the form for submitting a new ticket -->
        <label>
          Title
          <input id="title" name="title" required maxlength="100">
        </label>
        <label>
          Description
          <textarea id="description" name="description" required></textarea>
        </label>
        <label>
          Priority
          <select name="priority">
            <option value="regular">Regular</option>
            <option value="urgent">Urgent</option>
          </select>
        </label>
        <label>
          Your name
          <input name="creatorName">
        </label>
        <label>
          Your email
          <input name="creatorEmail" type="email">
        </label>
        <div class="actions">
          <button type="submit">Submit Ticket</button>
        </div>
      </form>
      <div id="submitMsg" class="muted"></div>
    </section>
<!-- This is the section for displaying the most recent tickets -->
    <section class="card">
      <h3>Recent Tickets</h3>
      <ul id="recentTickets" class="list"></ul>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
